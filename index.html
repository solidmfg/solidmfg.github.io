<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solid Manufacturing Project Board</title>
  <link rel="icon" href="solid-logo-favicon.png" />
  <style>
    :root {
      --accent: #a9142b;
      --accent-strong: #c52238;
      --accent-soft: rgba(169, 20, 43, 0.12);
      --bg: #f3f4f6;
      --bg-gradient-a: #f8f9fa;
      --bg-gradient-b: #e8ebef;
      --surface: #ffffff;
      --surface-2: #f5f6f8;
      --surface-3: #eef1f4;
      --text: #171a1f;
      --muted: #69727d;
      --line: #d7dce2;
      --line-soft: #e7eaee;
      --black: #111317;
      --white: #ffffff;
      --shadow: 0 20px 45px rgba(17, 19, 23, 0.08);
      --shadow-soft: 0 12px 26px rgba(17, 19, 23, 0.06);
      --radius: 20px;
      --base-font-size: 16px;
      --font-family: Arial, sans-serif;
    }

    :root.dark {
      --accent: #b51d34;
      --accent-strong: #d13a4f;
      --accent-soft: rgba(209, 58, 79, 0.13);
      --bg: #0d0f12;
      --bg-gradient-a: #111418;
      --bg-gradient-b: #0b0d10;
      --surface: #171a1f;
      --surface-2: #1f2329;
      --surface-3: #252a31;
      --text: #f3f5f7;
      --muted: #a6afb8;
      --line: #353b44;
      --line-soft: #282d35;
      --black: #070809;
      --white: #ffffff;
      --shadow: 0 24px 50px rgba(0, 0, 0, 0.32);
      --shadow-soft: 0 14px 28px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(181, 29, 52, 0.08), transparent 34rem),
        linear-gradient(135deg, var(--bg-gradient-a), var(--bg-gradient-b));
      color: var(--text);
      font-family: var(--font-family);
      font-size: var(--base-font-size);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: 82px;
      z-index: 50;
      background: color-mix(in srgb, var(--surface) 94%, var(--black));
      border-right: 1px solid var(--line);
      box-shadow: 16px 0 36px rgba(0, 0, 0, 0.16);
      overflow: hidden;
      transition: width 0.22s ease;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent-strong), var(--accent));
    }

    .sidebar:hover {
      width: 290px;
    }

    .brand {
      height: 104px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    .brand-logo-wrap {
      min-width: 50px;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--surface-2), var(--surface));
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
      display: block;
    }

    .brand-text,
    .nav-label,
    .sidebar-note {
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .sidebar:hover .brand-text,
    .sidebar:hover .nav-label,
    .sidebar:hover .sidebar-note {
      opacity: 1;
      transform: translateX(0);
    }

    .brand-title {
      font-weight: 950;
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .brand-subtitle {
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 900;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav {
      padding: 12px 0;
    }

    .nav-button {
      width: 100%;
      min-height: 70px;
      border: 0;
      border-bottom: 1px solid var(--line-soft);
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      text-align: left;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .nav-button:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .nav-button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: var(--white);
    }

    .nav-icon {
      min-width: 42px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 1.45rem;
      font-weight: 950;
      border-radius: 13px;
    }

    .nav-button.active .nav-icon {
      background: rgba(255, 255, 255, 0.12);
    }

    .nav-label {
      font-weight: 850;
    }

    .sidebar-note {
      width: 276px;
      margin: 18px 8px 0;
      padding: 16px 18px;
      color: var(--muted);
      line-height: 1.4;
      font-size: 0.84rem;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: var(--surface-2);
    }

    .main {
      margin-left: 82px;
      padding: 30px;
      min-height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      margin-bottom: 22px;
    }

    .page-kicker {
      color: var(--accent-strong);
      font-weight: 950;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    h1 {
      margin: 8px 0 6px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      line-height: 1.45;
      max-width: 920px;
      font-size: 1.02rem;
    }

    .today-chip {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent);
      color: var(--accent-strong);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 950;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .metric {
      background: linear-gradient(145deg, var(--surface), var(--surface-2));
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 950;
      color: var(--accent-strong);
      line-height: 1;
    }

    .metric-label {
      color: var(--text);
      margin-top: 9px;
      font-size: 0.94rem;
      font-weight: 850;
    }

    .dashboard-layout {
      display: grid;
      grid-template-columns: minmax(0, 2.15fr) 380px;
      gap: 22px;
      align-items: start;
    }

    .board-shell,
    .notice-shell,
    .page-card {
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .board-shell {
      border-radius: 24px;
      overflow: hidden;
      min-height: 500px;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--line-soft);
      background:
        linear-gradient(90deg, transparent, var(--accent-soft), transparent),
        var(--surface);
    }

    .board-header img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .board-title {
      color: var(--accent-strong);
      font-weight: 950;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .board-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .board-table th {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--surface);
    }

    .board-table td {
      padding: 16px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: top;
      min-height: 82px;
      height: 82px;
      overflow-wrap: anywhere;
      background: color-mix(in srgb, var(--surface) 96%, var(--surface-2));
    }

    .board-table tr:hover td {
      background: var(--surface-2);
    }

    .board-table tr:last-child td {
      border-bottom: 0;
    }

    .board-table .empty-row td {
      color: transparent;
      user-select: none;
      background:
        repeating-linear-gradient(
          135deg,
          transparent 0,
          transparent 10px,
          color-mix(in srgb, var(--line-soft) 38%, transparent) 10px,
          color-mix(in srgb, var(--line-soft) 38%, transparent) 11px
        ),
        var(--surface);
    }

    .project-name {
      font-weight: 950;
      color: var(--text);
      line-height: 1.2;
    }

    .client-name {
      color: var(--text);
      font-weight: 850;
      line-height: 1.3;
    }

    .small-note {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      margin-top: 4px;
    }

    .status-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 10px;
      font-weight: 800;
      outline: none;
    }

    .status-select:focus {
      border-color: var(--accent-strong);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 0.78rem;
      font-weight: 950;
      border: 1px solid transparent;
    }

    .badge-red {
      background: rgba(209, 58, 79, 0.16);
      color: #ff7d8e;
      border-color: rgba(209, 58, 79, 0.32);
    }

    :root:not(.dark) .badge-red {
      color: #9a1027;
      background: #fde9ec;
      border-color: #f6c7cf;
    }

    .badge-yellow {
      background: rgba(236, 181, 70, 0.18);
      color: #ffd178;
      border-color: rgba(236, 181, 70, 0.32);
    }

    :root:not(.dark) .badge-yellow {
      color: #8a5b09;
      background: #fff4cf;
      border-color: #f4dd94;
    }

    .badge-green {
      background: rgba(73, 172, 103, 0.16);
      color: #91e7ae;
      border-color: rgba(73, 172, 103, 0.32);
    }

    :root:not(.dark) .badge-green {
      color: #176333;
      background: #e3f7e9;
      border-color: #bdecc9;
    }

    .badge-gray {
      background: var(--surface-3);
      color: var(--muted);
      border-color: var(--line);
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 950;
      background: var(--black);
      color: var(--white);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    .btn-light {
      background: var(--surface);
      color: var(--accent-strong);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: #84202c;
      color: white;
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-small {
      padding: 7px 10px;
      font-size: 0.78rem;
      border-radius: 10px;
    }

    .notice-shell {
      border-radius: 24px;
      padding: 18px;
    }

    .notice-title {
      color: var(--accent-strong);
      text-align: center;
      font-weight: 950;
      margin: 0 0 16px;
      font-size: 1.65rem;
      letter-spacing: -0.03em;
    }

    .notice-list {
      display: grid;
      gap: 14px;
    }

    .notice-card {
      border: 1px solid var(--line);
      border-left: 6px solid var(--black);
      border-radius: 22px;
      padding: 17px;
      min-height: 96px;
      background: linear-gradient(145deg, var(--surface), var(--surface-2));
      position: relative;
      box-shadow: var(--shadow-soft);
    }

    .notice-card.reminder {
      border-left-color: var(--accent);
    }

    .notice-card .kind {
      color: var(--accent-strong);
      font-size: 0.74rem;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .notice-card h3 {
      margin: 0 0 7px;
      font-size: 1.02rem;
    }

    .notice-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.38;
    }

    .notice-meta {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      background: var(--surface-2);
      line-height: 1.5;
    }

    .page-card {
      border-radius: 24px;
      padding: 22px;
      overflow: hidden;
    }

    .form-layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .type-picker {
      display: grid;
      gap: 12px;
    }

    .type-button {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, var(--surface), var(--surface-2));
      color: var(--text);
      border-radius: 18px;
      padding: 16px;
      text-align: left;
      font-weight: 950;
      box-shadow: var(--shadow-soft);
    }

    .type-button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border-color: transparent;
      color: var(--white);
    }

    .type-button span {
      display: block;
      font-size: 0.82rem;
      font-weight: 750;
      opacity: 0.84;
      margin-top: 5px;
      line-height: 1.35;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 15px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--text);
      font-weight: 950;
      font-size: 0.88rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 13px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent-strong);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input[type="date"],
    input[type="datetime-local"],
    input[type="month"] {
      color-scheme: light;
    }

    :root.dark input[type="date"],
    :root.dark input[type="datetime-local"],
    :root.dark input[type="month"] {
      color-scheme: dark;
    }

    :root.dark input[type="date"]::-webkit-calendar-picker-indicator,
    :root.dark input[type="datetime-local"]::-webkit-calendar-picker-indicator,
    :root.dark input[type="month"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(1.45);
      opacity: 0.9;
    }

    input[type="color"] {
      min-height: 46px;
      padding: 5px;
    }

    .hint {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
      margin: 0;
    }

    .history-tools,
    .calendar-tools,
    .settings-grid {
      display: grid;
      gap: 14px;
    }

    .history-tools {
      grid-template-columns: minmax(0, 1fr) 190px auto;
      align-items: end;
      margin-bottom: 16px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    .history-table th {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: var(--white);
      text-align: left;
      padding: 12px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .history-table td {
      border-bottom: 1px solid var(--line-soft);
      padding: 12px;
      vertical-align: top;
    }

    .history-table tr:hover td {
      background: var(--surface-2);
    }

    .calendar-tools {
      grid-template-columns: auto 230px auto auto minmax(0, 1fr);
      align-items: center;
      margin-bottom: 16px;
    }

    .calendar-filter {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .check-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 850;
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .check-pill input {
      width: auto;
      margin: 0;
      accent-color: var(--accent-strong);
    }

    .calendar-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      background: var(--accent);
    }

    .legend-dot.reminder {
      background: var(--accent-strong);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: var(--surface);
    }

    .weekday {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: var(--white);
      text-align: center;
      font-weight: 950;
      padding: 11px 6px;
      border-right: 1px solid rgba(255, 255, 255, 0.18);
    }

    .day-cell {
      min-height: 126px;
      border-top: 1px solid var(--line-soft);
      border-right: 1px solid var(--line-soft);
      padding: 9px;
      background: var(--surface);
    }

    .day-cell:nth-child(7n) {
      border-right: 0;
    }

    .day-cell.outside {
      opacity: 0.45;
      background: var(--surface-2);
    }

    .day-num {
      font-weight: 950;
      color: var(--accent-strong);
      margin-bottom: 8px;
    }

    .cal-item {
      border-left: 4px solid var(--accent);
      background: var(--surface-2);
      color: var(--text);
      padding: 7px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 0.78rem;
      line-height: 1.25;
      font-weight: 850;
    }

    .cal-item.reminder {
      border-left-color: var(--accent-strong);
      background:
        linear-gradient(135deg, var(--accent-soft), transparent),
        var(--surface-2);
    }

    .cal-kind {
      display: block;
      color: var(--accent-strong);
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 950;
      margin-bottom: 3px;
    }

    .cal-item.done {
      opacity: 0.62;
      text-decoration: line-through;
    }

    .settings-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .setting-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: linear-gradient(145deg, var(--surface), var(--surface-2));
      box-shadow: var(--shadow-soft);
    }

    .setting-box h3 {
      margin: 0 0 10px;
      color: var(--accent-strong);
      font-size: 1.15rem;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .switch-row:last-child {
      border-bottom: 0;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: var(--black);
      color: var(--white);
      border-left: 6px solid var(--accent-strong);
      padding: 14px 17px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      font-weight: 950;
      z-index: 100;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      max-width: min(420px, calc(100vw - 32px));
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .compact .board-table td {
      height: 58px;
      min-height: 58px;
      padding: 10px 12px;
    }

    .compact .day-cell {
      min-height: 94px;
    }

    @media (max-width: 1160px) {
      .dashboard-layout,
      .form-layout,
      .settings-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .history-tools,
      .calendar-tools {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 740px) {
      .main {
        padding: 18px;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .today-chip {
        display: inline-flex;
        width: max-content;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        min-width: 780px;
      }

      .calendar-scroll {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo-wrap">
        <img class="brand-logo" src="solid-logo.png" alt="Solid Manufacturing logo" />
      </div>
      <div class="brand-text">
        <div class="brand-title">Solid Manufacturing</div>
        <div class="brand-subtitle">Project Board</div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-button" data-page="home" onclick="goToPage('home')">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-button" data-page="create" onclick="goToPage('create')">
        <span class="nav-icon">+</span>
        <span class="nav-label">Add New</span>
      </button>
      <button class="nav-button" data-page="history" onclick="goToPage('history')">
        <span class="nav-icon">≡</span>
        <span class="nav-label">Project History</span>
      </button>
      <button class="nav-button" data-page="calendar" onclick="goToPage('calendar')">
        <span class="nav-icon">□</span>
        <span class="nav-label">Calendar</span>
      </button>
      <button class="nav-button" data-page="settings" onclick="goToPage('settings')">
        <span class="nav-icon">⚙</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

    <div class="sidebar-note">
      Hover near the left edge to expand the menu. Move away and it tucks itself back in.
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-kicker" id="pageKicker">Home</div>
        <h1 id="pageTitle">Solid Manufacturing Project Board</h1>
        <p class="subtitle" id="pageSubtitle">A local project board for deadlines, client work, notices, and reminders.</p>
      </div>
      <div class="today-chip" id="todayChip"></div>
    </div>

    <div id="view"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "solidManufacturingProjectBoardV4";
    const LEGACY_KEYS = ["solidManufacturingProjectBoardV3", "projectBoardLocalV2"];
    const DAY = 24 * 60 * 60 * 1000;

    const DEFAULT_STATE = {
      projects: [],
      notices: [],
      reminders: [],
      settings: {
        darkMode: true,
        fontSize: "16px",
        fontFamily: "Arial, sans-serif",
        compactMode: false
      }
    };

    const FONT_OPTIONS = [
      ["Arial, sans-serif", "Arial"],
      ["Verdana, sans-serif", "Verdana"],
      ["Tahoma, sans-serif", "Tahoma"],
      ["'Trebuchet MS', sans-serif", "Trebuchet MS"],
      ["Georgia, serif", "Georgia"],
      ["'Times New Roman', serif", "Times New Roman"],
      ["'Courier New', monospace", "Courier New"],
      ["'Lucida Console', monospace", "Lucida Console"],
      ["Impact, sans-serif", "Impact"],
      ["'Comic Sans MS', cursive", "Comic Sans MS"]
    ];

    const ACTIVE_STATUS_OPTIONS = ["Not Started", "In Progress", "Waiting on Client", "On Hold"];
    const ALL_STATUS_OPTIONS = [...ACTIVE_STATUS_OPTIONS, "Completed"];
    const PRIORITY_OPTIONS = ["High", "Medium", "Low"];

    const LEGACY_STATUS = {
      "Pendiente": "Not Started",
      "En proceso": "In Progress",
      "Esperando cliente": "Waiting on Client",
      "Pausado": "On Hold",
      "Completado": "Completed"
    };

    const LEGACY_PRIORITY = {
      "Alta": "High",
      "Media": "Medium",
      "Baja": "Low"
    };

    let state = loadState();
    let currentPage = location.hash ? location.hash.replace("#", "") : "home";
    let createType = "project";
    let historySearch = "";
    let calendarMonth = localMonthKey();
    let calendarShowProjects = true;
    let calendarShowReminders = true;

    init();

    function init() {
      saveState();
      applySettings();

      document.getElementById("todayChip").textContent = new Date().toLocaleDateString("en-US", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });

      window.addEventListener("hashchange", () => {
        currentPage = location.hash.replace("#", "") || "home";
        render();
      });

      render();

      setInterval(() => {
        cleanExpiredItems();
        if (currentPage === "home") render();
      }, 60 * 1000);
    }

    function baseState() {
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }

    function loadState() {
      const current = localStorage.getItem(STORAGE_KEY);
      if (current) {
        try {
          return mergeState(JSON.parse(current));
        } catch (error) {
          console.warn("Could not read saved board data.", error);
        }
      }

      for (const legacyKey of LEGACY_KEYS) {
        const legacy = localStorage.getItem(legacyKey);
        if (legacy) {
          try {
            return mergeState(JSON.parse(legacy));
          } catch (error) {
            console.warn(`Could not migrate legacy board data from ${legacyKey}.`, error);
          }
        }
      }

      const fresh = baseState();

      try {
        const oldTasks = JSON.parse(localStorage.getItem("tasks") || "[]");
        const oldAnnouncements = JSON.parse(localStorage.getItem("announcements") || "[]");

        if (Array.isArray(oldTasks) && oldTasks.length) {
          fresh.projects = oldTasks.map(task => normalizeProject({
            id: task.id || uid(),
            name: task.title || "Untitled Project",
            client: task.client || "No client",
            status: task.done ? "Completed" : "Not Started",
            deadline: task.deadline || localDateKey(),
            priority: task.importance || "Medium",
            color: task.color || "#a9142b",
            notes: task.notes || "",
            estimatedDelivery: "",
            createdAt: task.createdAt || Date.now(),
            completedAt: task.done ? Date.now() : null,
            deliveredAt: task.done ? localDateKey() : ""
          }));
        }

        if (Array.isArray(oldAnnouncements) && oldAnnouncements.length) {
          fresh.notices = oldAnnouncements
            .filter(item => item.expiresAt > Date.now())
            .map(item => ({
              id: item.id || uid(),
              title: "Notice",
              body: item.text || "",
              color: "#a9142b",
              createdAt: Date.now(),
              expiresAt: item.expiresAt
            }));
        }
      } catch (error) {
        console.warn("Could not migrate older data.", error);
      }

      return mergeState(fresh);
    }

    function mergeState(value) {
      const fresh = baseState();
      const merged = {
        ...fresh,
        ...value,
        projects: Array.isArray(value.projects) ? value.projects.map(normalizeProject) : [],
        notices: Array.isArray(value.notices) ? value.notices.map(normalizeNotice).filter(Boolean) : [],
        reminders: Array.isArray(value.reminders) ? value.reminders.map(normalizeReminder).filter(Boolean) : [],
        settings: {
          ...fresh.settings,
          ...(value.settings || {})
        }
      };

      return merged;
    }

    function normalizeProject(project) {
      const status = LEGACY_STATUS[project.status] || project.status || "Not Started";
      const prioritySource = project.priority || project.importance || "Medium";
      const priority = LEGACY_PRIORITY[prioritySource] || prioritySource || "Medium";

      return {
        id: project.id || uid(),
        name: project.name || project.title || "Untitled Project",
        client: project.client || "No client",
        status,
        deadline: project.deadline || localDateKey(),
        priority,
        color: project.color || "#a9142b",
        notes: project.notes || project.comment || "",
        estimatedDelivery: project.estimatedDelivery || "",
        createdAt: project.createdAt || Date.now(),
        completedAt: project.completedAt || (status === "Completed" ? Date.now() : null),
        deliveredAt: project.deliveredAt || ""
      };
    }

    function normalizeNotice(notice) {
      if (!notice) return null;
      return {
        id: notice.id || uid(),
        title: notice.title || "Notice",
        body: notice.body || notice.text || "",
        color: notice.color || "#a9142b",
        createdAt: notice.createdAt || Date.now(),
        expiresAt: notice.expiresAt || Date.now() + DAY
      };
    }

    function normalizeReminder(reminder) {
      if (!reminder) return null;
      return {
        id: reminder.id || uid(),
        title: reminder.title || "Reminder",
        body: reminder.body || "",
        color: reminder.color || "#a9142b",
        remindAt: reminder.remindAt || "",
        createdAt: reminder.createdAt || Date.now()
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applySettings() {
      document.documentElement.classList.toggle("dark", Boolean(state.settings.darkMode));
      document.documentElement.style.setProperty("--base-font-size", state.settings.fontSize || "16px");
      document.documentElement.style.setProperty("--font-family", state.settings.fontFamily || "Arial, sans-serif");
      document.body.classList.toggle("compact", Boolean(state.settings.compactMode));
    }

    function goToPage(page) {
      location.hash = page;
    }

    function render() {
      cleanExpiredItems();

      const pages = {
        home: {
          kicker: "Home",
          title: "Solid Manufacturing Project Board",
          subtitle: "A clean local dashboard for active projects, deadlines, notices, and time-based reminders.",
          html: renderHome
        },
        create: {
          kicker: "Add New",
          title: "Create a Project, Notice, or Reminder",
          subtitle: "Choose the item type first, then fill out the fields that apply to it.",
          html: renderCreate
        },
        history: {
          kicker: "Project History",
          title: "Completed Project History",
          subtitle: "Search completed work, reopen projects, or purge older records to keep the local board light.",
          html: renderHistory
        },
        calendar: {
          kicker: "Calendar",
          title: "Project Deadline Calendar",
          subtitle: "Pick a month and review project deadlines plus scheduled reminders in one view.",
          html: renderCalendar
        },
        settings: {
          kicker: "Settings",
          title: "Board Settings",
          subtitle: "Adjust the look and manage your local data backups.",
          html: renderSettings
        }
      };

      if (!pages[currentPage]) currentPage = "home";

      document.getElementById("pageKicker").textContent = pages[currentPage].kicker;
      document.getElementById("pageTitle").textContent = pages[currentPage].title;
      document.getElementById("pageSubtitle").textContent = pages[currentPage].subtitle;

      document.querySelectorAll(".nav-button").forEach(button => {
        button.classList.toggle("active", button.dataset.page === currentPage);
      });

      document.getElementById("view").innerHTML = pages[currentPage].html();

      if (currentPage === "create") renderCreateForm();
      if (currentPage === "history") renderHistoryTable();
      if (currentPage === "calendar") renderCalendarGrid();
      if (currentPage === "settings") syncSettingsControls();
    }

    function renderHome() {
      const activeProjects = getActiveProjects();
      const completedProjects = getCompletedProjects();
      const dueSoon = activeProjects.filter(project => daysUntil(project.deadline) <= 3).length;
      const visibleItems = getVisibleNoticeItems();

      return `
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-value">${activeProjects.length}</div>
            <div class="metric-label">Active Projects</div>
          </div>
          <div class="metric">
            <div class="metric-value">${dueSoon}</div>
            <div class="metric-label">Close to Deadline</div>
          </div>
          <div class="metric">
            <div class="metric-value">${visibleItems.length}</div>
            <div class="metric-label">Visible Notices</div>
          </div>
          <div class="metric">
            <div class="metric-value">${completedProjects.length}</div>
            <div class="metric-label">Completed in History</div>
          </div>
        </div>

        <div class="dashboard-layout">
          <section class="board-shell">
            <div class="board-header">
              <img src="solid-logo.png" alt="" />
              <div class="board-title">Project Board</div>
            </div>
            ${renderProjectBoard(activeProjects)}
          </section>

          <aside class="notice-shell">
            <h2 class="notice-title">Notices</h2>
            ${renderNoticeBoard(visibleItems)}
          </aside>
        </div>
      `;
    }

    function renderProjectBoard(projects) {
      const rows = projects.map(project => {
        const due = deadlineInfo(project.deadline);

        return `
          <tr>
            <td>
              <div class="project-name" style="border-left: 5px solid ${escapeAttr(project.color || "#a9142b")}; padding-left: 9px;">
                ${escapeHtml(project.name)}
              </div>
              <div class="small-note">Priority: ${escapeHtml(project.priority || "Medium")}</div>
            </td>
            <td>
              <div class="client-name">${escapeHtml(project.client || "No client")}</div>
            </td>
            <td>
              <select class="status-select" onchange="updateProjectStatus('${project.id}', this.value)">
                ${ALL_STATUS_OPTIONS.map(option => `<option value="${option}" ${project.status === option ? "selected" : ""}>${option}</option>`).join("")}
              </select>
            </td>
            <td>
              <div><strong>${formatDate(project.deadline)}</strong></div>
              <div class="notice-meta">
                <span class="badge ${due.className}">${due.label}</span>
              </div>
            </td>
            <td>
              ${project.estimatedDelivery ? `<strong>${formatDate(project.estimatedDelivery)}</strong>` : `<span class="small-note">Not set</span>`}
            </td>
            <td>
              <div class="small-note">${project.notes ? escapeHtml(project.notes) : "No notes yet"}</div>
              <div class="row-actions">
                <button class="btn btn-primary btn-small" onclick="completeProject('${project.id}')">Complete</button>
                <button class="btn btn-ghost btn-small" onclick="editProjectNotes('${project.id}')">Notes</button>
                <button class="btn btn-danger btn-small" onclick="deleteProject('${project.id}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      });

      const emptyRowsNeeded = Math.max(0, 5 - rows.length);
      for (let i = 0; i < emptyRowsNeeded; i++) {
        rows.push(`
          <tr class="empty-row">
            <td>empty</td>
            <td>empty</td>
            <td>empty</td>
            <td>empty</td>
            <td>empty</td>
            <td>empty</td>
          </tr>
        `);
      }

      if (!projects.length) {
        rows[0] = `
          <tr>
            <td colspan="6">
              <div class="empty-state">
                No active projects yet. Use <strong>Add New</strong> to create the first one.
              </div>
            </td>
          </tr>
        `;
      }

      return `
        <table class="board-table">
          <thead>
            <tr>
              <th style="width: 23%;">Project Name</th>
              <th style="width: 14%;">Client</th>
              <th style="width: 15%;">Status</th>
              <th style="width: 15%;">Deadline</th>
              <th style="width: 16%;">Estimated Delivery</th>
              <th style="width: 17%;">Notes / Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.join("")}
          </tbody>
        </table>
      `;
    }

    function renderNoticeBoard(items) {
      if (!items.length) {
        return `
          <div class="empty-state">
            No active notices or reminders within the next two days.
          </div>
        `;
      }

      return `
        <div class="notice-list">
          ${items.map(item => `
            <article class="notice-card ${item.type === "reminder" ? "reminder" : ""}">
              <div class="kind">${item.type === "reminder" ? "Reminder" : "Notice"}</div>
              <h3>${escapeHtml(item.title)}</h3>
              <p>${escapeHtml(item.body || "")}</p>
              <div class="notice-meta">
                <span class="badge ${item.type === "reminder" ? "badge-red" : "badge-gray"}">${item.timeLabel}</span>
              </div>
              <div class="row-actions">
                <button class="btn btn-danger btn-small" onclick="${item.type === "reminder" ? `deleteReminder('${item.id}')` : `deleteNotice('${item.id}')`}">Remove</button>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderCreate() {
      return `
        <section class="page-card">
          <div class="form-layout">
            <div class="type-picker">
              <button class="type-button ${createType === "project" ? "active" : ""}" onclick="setCreateType('project')">
                Project
                <span>Client work with a deadline, priority, status, estimated delivery date, and notes.</span>
              </button>
              <button class="type-button ${createType === "notice" ? "active" : ""}" onclick="setCreateType('notice')">
                Notice
                <span>A quick announcement that auto-removes after 1, 2, or 3 days.</span>
              </button>
              <button class="type-button ${createType === "reminder" ? "active" : ""}" onclick="setCreateType('reminder')">
                Reminder
                <span>Shows up two days before the selected date and disappears when it expires.</span>
              </button>
            </div>

            <div id="createFormHost"></div>
          </div>
        </section>
      `;
    }

    function setCreateType(type) {
      createType = type;
      render();
    }

    function renderCreateForm() {
      const host = document.getElementById("createFormHost");
      if (!host) return;

      if (createType === "project") {
        host.innerHTML = `
          <form class="form-grid" onsubmit="submitProject(event)">
            <div class="field full">
              <label>Project Name</label>
              <input id="projectName" required placeholder="Example: Eaton fixture order" />
            </div>

            <div class="field">
              <label>Client</label>
              <input id="projectClient" required placeholder="Client name" />
            </div>

            <div class="field">
              <label>Deadline</label>
              <input id="projectDeadline" required type="date" />
            </div>

            <div class="field">
              <label>Priority</label>
              <select id="projectPriority" required>
                ${PRIORITY_OPTIONS.map(option => `<option value="${option}">${option}</option>`).join("")}
              </select>
            </div>

            <div class="field">
              <label>Initial Status</label>
              <select id="projectStatus" required>
                ${ACTIVE_STATUS_OPTIONS.map(option => `<option value="${option}">${option}</option>`).join("")}
              </select>
            </div>

            <div class="field">
              <label>Estimated Delivery Date</label>
              <input id="projectEstimatedDelivery" type="date" />
            </div>

            <div class="field">
              <label>Project Accent Color</label>
              <input id="projectColor" type="color" value="#a9142b" />
            </div>

            <div class="field full">
              <label>Notes</label>
              <textarea id="projectNotes" placeholder="Instructions, client details, blockers, comments, etc."></textarea>
            </div>

            <div class="field full">
              <button class="btn btn-primary" type="submit">Create Project</button>
            </div>
          </form>
        `;
      }

      if (createType === "notice") {
        host.innerHTML = `
          <form class="form-grid" onsubmit="submitNotice(event)">
            <div class="field full">
              <label>Notice Title</label>
              <input id="noticeTitle" required placeholder="Example: Shop meeting" />
            </div>

            <div class="field full">
              <label>Message</label>
              <textarea id="noticeBody" required placeholder="Write the announcement that should appear on Home."></textarea>
            </div>

            <div class="field">
              <label>Auto-remove After</label>
              <select id="noticeDays">
                <option value="1">1 day</option>
                <option value="2">2 days</option>
                <option value="3">3 days</option>
              </select>
            </div>

            <div class="field">
              <label>Accent Color</label>
              <input id="noticeColor" type="color" value="#a9142b" />
            </div>

            <div class="field full">
              <button class="btn btn-primary" type="submit">Publish Notice</button>
            </div>
          </form>
        `;
      }

      if (createType === "reminder") {
        host.innerHTML = `
          <form class="form-grid" onsubmit="submitReminder(event)">
            <div class="field full">
              <label>Reminder Title</label>
              <input id="reminderTitle" required placeholder="Example: Review quote" />
            </div>

            <div class="field full">
              <label>Message</label>
              <textarea id="reminderBody" placeholder="Optional reminder details."></textarea>
            </div>

            <div class="field">
              <label>Date and Time</label>
              <input id="reminderAt" required type="datetime-local" />
            </div>

            <div class="field">
              <label>Accent Color</label>
              <input id="reminderColor" type="color" value="#a9142b" />
            </div>

            <div class="field full">
              <p class="hint">This reminder will appear in Notices starting two days before the selected date and time. It will remove itself when that time expires.</p>
            </div>

            <div class="field full">
              <button class="btn btn-primary" type="submit">Create Reminder</button>
            </div>
          </form>
        `;
      }
    }

    function renderHistory() {
      return `
        <section class="page-card">
          <div class="history-tools">
            <div class="field">
              <label>Search Completed Projects</label>
              <input id="historySearch" placeholder="Search by project, client, status, date, or notes..." value="${escapeAttr(historySearch)}" oninput="historySearch = this.value; renderHistoryTable();" />
            </div>

            <div class="field">
              <label>Purge Older Than</label>
              <select id="purgeMonths">
                <option value="1">1 month</option>
                <option value="2" selected>2 months</option>
                <option value="3">3 months</option>
                <option value="6">6 months</option>
                <option value="12">12 months</option>
              </select>
            </div>

            <button class="btn btn-danger" onclick="purgeOldProjects()">Purge Old Records</button>
          </div>

          <p class="hint">
            Purge removes completed project records older than the selected cutoff. It targets the oldest records first so the board keeps only useful recent history.
          </p>

          <div id="historyTableHost" style="margin-top: 14px;"></div>
        </section>
      `;
    }

    function renderHistoryTable() {
      const host = document.getElementById("historyTableHost");
      if (!host) return;

      const query = (document.getElementById("historySearch")?.value || historySearch || "").trim().toLowerCase();

      const completed = getCompletedProjects()
        .filter(project => {
          const haystack = [
            project.name,
            project.client,
            project.status,
            project.priority,
            project.deadline,
            project.estimatedDelivery,
            project.deliveredAt,
            project.notes
          ].join(" ").toLowerCase();

          return !query || haystack.includes(query);
        })
        .sort((a, b) => completedMs(b) - completedMs(a));

      if (!completed.length) {
        host.innerHTML = `
          <div class="empty-state">
            No completed projects match this search.
          </div>
        `;
        return;
      }

      host.innerHTML = `
        <div class="table-wrap">
          <table class="history-table">
            <thead>
              <tr>
                <th>Project Name</th>
                <th>Client</th>
                <th>Priority</th>
                <th>Deadline</th>
                <th>Estimated Delivery</th>
                <th>Delivered On</th>
                <th>Completed At</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${completed.map(project => `
                <tr>
                  <td><strong>${escapeHtml(project.name)}</strong></td>
                  <td>${escapeHtml(project.client || "No client")}</td>
                  <td>${escapeHtml(project.priority || "Medium")}</td>
                  <td>${formatDate(project.deadline)}</td>
                  <td>${project.estimatedDelivery ? formatDate(project.estimatedDelivery) : "—"}</td>
                  <td>${project.deliveredAt ? formatDate(project.deliveredAt) : "—"}</td>
                  <td>${project.completedAt ? formatDateTime(project.completedAt) : "—"}</td>
                  <td>${project.notes ? escapeHtml(project.notes) : "No notes"}</td>
                  <td>
                    <div class="row-actions">
                      <button class="btn btn-ghost btn-small" onclick="restoreProject('${project.id}')">Reopen</button>
                      <button class="btn btn-danger btn-small" onclick="deleteProject('${project.id}')">Delete</button>
                    </div>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderCalendar() {
      return `
        <section class="page-card">
          <div class="calendar-tools">
            <button class="btn btn-ghost" onclick="changeCalendarMonth(-1)">Previous Month</button>
            <input id="calendarMonth" type="month" value="${calendarMonth}" onchange="calendarMonth = this.value; renderCalendarGrid();" />
            <button class="btn btn-ghost" onclick="changeCalendarMonth(1)">Next Month</button>
            <button class="btn btn-light" onclick="jumpToCurrentMonth()">Today</button>
            <div class="calendar-filter">
              <label class="check-pill">
                <input type="checkbox" ${calendarShowProjects ? "checked" : ""} onchange="calendarShowProjects = this.checked; renderCalendarGrid();" />
                Projects
              </label>
              <label class="check-pill">
                <input type="checkbox" ${calendarShowReminders ? "checked" : ""} onchange="calendarShowReminders = this.checked; renderCalendarGrid();" />
                Reminders
              </label>
            </div>
          </div>

          <div class="calendar-legend" style="margin-bottom: 12px;">
            <span class="hint"><span class="legend-dot"></span> Project deadline</span>
            <span class="hint"><span class="legend-dot reminder"></span> Reminder</span>
          </div>

          <div class="calendar-scroll">
            <div id="calendarHost"></div>
          </div>
        </section>
      `;
    }

    function renderCalendarGrid() {
      const host = document.getElementById("calendarHost");
      if (!host) return;

      const [year, monthNumber] = calendarMonth.split("-").map(Number);
      const monthIndex = monthNumber - 1;
      const firstDay = new Date(year, monthIndex, 1);
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const offset = (firstDay.getDay() + 6) % 7;
      const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
      const weekdays = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      const projects = calendarShowProjects
        ? [...state.projects].sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
        : [];

      const reminders = calendarShowReminders
        ? [...state.reminders]
            .filter(reminder => {
              const target = new Date(reminder.remindAt).getTime();
              return reminder.remindAt && !Number.isNaN(target) && target > Date.now();
            })
            .sort((a, b) => new Date(a.remindAt) - new Date(b.remindAt))
        : [];

      let cells = weekdays.map(day => `<div class="weekday">${day}</div>`).join("");

      for (let i = 0; i < totalCells; i++) {
        const dayNumber = i - offset + 1;
        const inside = dayNumber >= 1 && dayNumber <= daysInMonth;
        const key = inside ? dateKeyFromParts(year, monthNumber, dayNumber) : "";
        const projectsForDay = inside ? projects.filter(project => project.deadline === key) : [];
        const remindersForDay = inside ? reminders.filter(reminder => localDateKey(new Date(reminder.remindAt)) === key) : [];

        cells += `
          <div class="day-cell ${inside ? "" : "outside"}">
            <div class="day-num">${inside ? dayNumber : ""}</div>
            ${projectsForDay.map(project => `
              <div class="cal-item ${isProjectCompleted(project) ? "done" : ""}" title="${escapeAttr(project.client || "")}">
                ${escapeHtml(project.name)}
                <div class="small-note">${escapeHtml(project.client || "No client")}</div>
              </div>
            `).join("")}
            ${remindersForDay.map(reminder => `
              <div class="cal-item reminder" title="${escapeAttr(reminder.body || "")}">
                <span class="cal-kind">Reminder</span>
                ${escapeHtml(reminder.title)}
                <div class="small-note">${formatDateTime(reminder.remindAt)}</div>
              </div>
            `).join("")}
          </div>
        `;
      }

      host.innerHTML = `<div class="calendar-grid">${cells}</div>`;
    }

    function renderSettings() {
      return `
        <section class="page-card">
          <div class="settings-grid">
            <div class="setting-box">
              <h3>Appearance</h3>

              <div class="switch-row">
                <div>
                  <strong>Dark Mode</strong>
                  <div class="hint">Uses a softer black/gray palette with muted lines.</div>
                </div>
                <input id="settingDarkMode" type="checkbox" onchange="updateSetting('darkMode', this.checked)" />
              </div>

              <div class="field" style="margin-top: 12px;">
                <label>Font Size</label>
                <select id="settingFontSize" onchange="updateSetting('fontSize', this.value)">
                  <option value="14px">Small</option>
                  <option value="16px">Normal</option>
                  <option value="18px">Large</option>
                  <option value="20px">Extra Large</option>
                </select>
              </div>

              <div class="field" style="margin-top: 12px;">
                <label>Font Type</label>
                <select id="settingFontFamily" onchange="updateSetting('fontFamily', this.value)">
                  ${FONT_OPTIONS.map(([value, label]) => `<option value="${escapeAttr(value)}">${label}</option>`).join("")}
                </select>
              </div>

              <div class="switch-row" style="margin-top: 12px;">
                <div>
                  <strong>Compact View</strong>
                  <div class="hint">Tighter rows and calendar cells.</div>
                </div>
                <input id="settingCompactMode" type="checkbox" onchange="updateSetting('compactMode', this.checked)" />
              </div>
            </div>

            <div class="setting-box">
              <h3>Local Data</h3>
              <p class="hint">
                This app saves data in your browser using localStorage. Use backup export/import when moving data to another computer.
              </p>

              <div class="row-actions" style="margin-top: 14px;">
                <button class="btn btn-primary" onclick="exportBackup()">Export Backup</button>
                <label class="btn btn-light">
                  Import Backup
                  <input type="file" accept="application/json" style="display:none" onchange="importBackup(this)" />
                </label>
              </div>

              <div style="height: 16px;"></div>

              <button class="btn btn-danger" onclick="resetEverything()">Delete Everything</button>
            </div>

            <div class="setting-box">
              <h3>Board Rules</h3>
              <p class="hint">
                Active projects are sorted by deadline. Notices auto-remove after 1, 2, or 3 days. Reminders appear two days before their selected date and disappear when that date/time expires.
              </p>
            </div>

            <div class="setting-box">
              <h3>Color Direction</h3>
              <p class="hint">
                The interface uses Solid-style red as an accent, with softer gray lines and cleaner black/white surfaces for better readability.
              </p>
            </div>
          </div>
        </section>
      `;
    }

    function syncSettingsControls() {
      const dark = document.getElementById("settingDarkMode");
      const size = document.getElementById("settingFontSize");
      const family = document.getElementById("settingFontFamily");
      const compact = document.getElementById("settingCompactMode");

      if (dark) dark.checked = Boolean(state.settings.darkMode);
      if (size) size.value = state.settings.fontSize || "16px";
      if (family) family.value = state.settings.fontFamily || "Arial, sans-serif";
      if (compact) compact.checked = Boolean(state.settings.compactMode);
    }

    function submitProject(event) {
      event.preventDefault();

      state.projects.push({
        id: uid(),
        name: valueOf("projectName"),
        client: valueOf("projectClient"),
        status: valueOf("projectStatus"),
        deadline: valueOf("projectDeadline"),
        priority: valueOf("projectPriority"),
        color: valueOf("projectColor") || "#a9142b",
        notes: valueOf("projectNotes"),
        estimatedDelivery: valueOf("projectEstimatedDelivery"),
        createdAt: Date.now(),
        completedAt: null,
        deliveredAt: ""
      });

      saveState();
      showToast("Project created.");
      goToPage("home");
    }

    function submitNotice(event) {
      event.preventDefault();

      const days = Number(valueOf("noticeDays") || 1);

      state.notices.push({
        id: uid(),
        title: valueOf("noticeTitle"),
        body: valueOf("noticeBody"),
        color: valueOf("noticeColor") || "#a9142b",
        createdAt: Date.now(),
        expiresAt: Date.now() + days * DAY
      });

      saveState();
      showToast("Notice published.");
      goToPage("home");
    }

    function submitReminder(event) {
      event.preventDefault();

      const remindAt = valueOf("reminderAt");
      const target = new Date(remindAt).getTime();

      if (!remindAt || Number.isNaN(target)) {
        alert("Please enter a valid date and time.");
        return;
      }

      if (target <= Date.now()) {
        alert("The reminder needs a future date and time.");
        return;
      }

      state.reminders.push({
        id: uid(),
        title: valueOf("reminderTitle"),
        body: valueOf("reminderBody"),
        color: valueOf("reminderColor") || "#a9142b",
        remindAt,
        createdAt: Date.now()
      });

      saveState();
      showToast("Reminder created. It will appear two days before it expires.");
      goToPage("home");
    }

    function updateProjectStatus(id, status) {
      const project = state.projects.find(item => item.id === id);
      if (!project) return;

      if (status === "Completed") {
        completeProject(id);
        return;
      }

      project.status = status;
      project.completedAt = null;
      project.deliveredAt = "";
      saveState();
      render();
    }

    function completeProject(id) {
      const project = state.projects.find(item => item.id === id);
      if (!project) return;

      const delivered = prompt("Delivered date (YYYY-MM-DD):", localDateKey());
      if (delivered === null) {
        render();
        return;
      }

      const cleanedDate = delivered.trim() || localDateKey();

      if (!/^\d{4}-\d{2}-\d{2}$/.test(cleanedDate)) {
        alert("Please use the format YYYY-MM-DD.");
        render();
        return;
      }

      project.status = "Completed";
      project.deliveredAt = cleanedDate;
      project.completedAt = Date.now();

      saveState();
      showToast("Project moved to history.");
      render();
    }

    function restoreProject(id) {
      const project = state.projects.find(item => item.id === id);
      if (!project) return;

      project.status = "In Progress";
      project.completedAt = null;
      project.deliveredAt = "";
      saveState();
      showToast("Project reopened.");
      render();
    }

    function editProjectNotes(id) {
      const project = state.projects.find(item => item.id === id);
      if (!project) return;

      const next = prompt("Project notes:", project.notes || "");
      if (next === null) return;

      project.notes = next;
      saveState();
      render();
    }

    function deleteProject(id) {
      const project = state.projects.find(item => item.id === id);
      if (!project) return;

      if (!confirm(`Delete "${project.name}"? This cannot be undone.`)) return;

      state.projects = state.projects.filter(item => item.id !== id);
      saveState();
      showToast("Project deleted.");
      render();
    }

    function deleteNotice(id) {
      state.notices = state.notices.filter(item => item.id !== id);
      saveState();
      render();
    }

    function deleteReminder(id) {
      state.reminders = state.reminders.filter(item => item.id !== id);
      saveState();
      render();
    }

    function purgeOldProjects() {
      const months = Number(document.getElementById("purgeMonths")?.value || 2);
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - months);

      const candidates = getCompletedProjects()
        .filter(project => completedMs(project) < cutoff.getTime())
        .sort((a, b) => completedMs(a) - completedMs(b));

      if (!candidates.length) {
        alert(`No completed projects are older than ${months} month(s).`);
        return;
      }

      const oldest = candidates[0];
      const newest = candidates[candidates.length - 1];

      if (!confirm(
        `This will delete ${candidates.length} completed project record(s) older than ${months} month(s).\n\n` +
        `Oldest: ${oldest.name}\n` +
        `Newest inside cutoff: ${newest.name}\n\n` +
        `Continue?`
      )) return;

      const ids = new Set(candidates.map(project => project.id));
      state.projects = state.projects.filter(project => !ids.has(project.id));
      saveState();
      showToast("Purge complete.");
      render();
    }

    function changeCalendarMonth(delta) {
      const [year, month] = calendarMonth.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      calendarMonth = `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
      const input = document.getElementById("calendarMonth");
      if (input) input.value = calendarMonth;
      renderCalendarGrid();
    }

    function jumpToCurrentMonth() {
      calendarMonth = localMonthKey();
      const input = document.getElementById("calendarMonth");
      if (input) input.value = calendarMonth;
      renderCalendarGrid();
      showToast("Calendar returned to the current month.");
    }

    function updateSetting(key, value) {
      state.settings[key] = value;
      saveState();
      applySettings();
      showToast("Setting saved.");
    }

    function exportBackup() {
      const data = {
        exportedAt: new Date().toISOString(),
        app: "solidManufacturingProjectBoardV4",
        data: state
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `solid-project-board-backup-${localDateKey()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importBackup(input) {
      const file = input.files && input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const imported = parsed.data ? parsed.data : parsed;

          if (!Array.isArray(imported.projects) || !Array.isArray(imported.notices) || !Array.isArray(imported.reminders)) {
            throw new Error("Invalid backup format.");
          }

          if (!confirm("This will replace your current local board data. Continue?")) return;

          state = mergeState(imported);
          saveState();
          applySettings();
          showToast("Backup imported.");
          render();
        } catch (error) {
          alert("Could not import this backup. Please choose a valid JSON backup from this app.");
        } finally {
          input.value = "";
        }
      };
      reader.readAsText(file);
    }

    function resetEverything() {
      if (!confirm("Delete all projects, notices, reminders, and settings?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = baseState();
      applySettings();
      showToast("All local data deleted.");
      goToPage("home");
      render();
    }

    function getActiveProjects() {
      return state.projects
        .filter(project => !isProjectCompleted(project))
        .sort((a, b) => {
          const byDate = parseLocalDate(a.deadline) - parseLocalDate(b.deadline);
          if (byDate !== 0) return byDate;
          return priorityRank(a.priority) - priorityRank(b.priority);
        });
    }

    function getCompletedProjects() {
      return state.projects.filter(isProjectCompleted);
    }

    function isProjectCompleted(project) {
      return project.status === "Completed" || Boolean(project.completedAt);
    }

    function getVisibleNoticeItems() {
      const now = Date.now();

      const noticeItems = state.notices
        .filter(notice => notice.expiresAt > now)
        .map(notice => ({
          ...notice,
          type: "notice",
          timeLabel: `Removes in ${timeLeft(notice.expiresAt - now)}`
        }));

      const reminderItems = state.reminders
        .filter(reminder => {
          const target = new Date(reminder.remindAt).getTime();
          return target > now && target - now <= 2 * DAY;
        })
        .map(reminder => {
          const target = new Date(reminder.remindAt).getTime();
          return {
            ...reminder,
            type: "reminder",
            timeLabel: `Expires in ${timeLeft(target - now)}`
          };
        });

      return [...noticeItems, ...reminderItems].sort((a, b) => {
        const aTime = a.type === "notice" ? a.expiresAt : new Date(a.remindAt).getTime();
        const bTime = b.type === "notice" ? b.expiresAt : new Date(b.remindAt).getTime();
        return aTime - bTime;
      });
    }

    function cleanExpiredItems() {
      const now = Date.now();
      const noticesBefore = state.notices.length;
      const remindersBefore = state.reminders.length;

      state.notices = state.notices.filter(notice => notice.expiresAt > now);
      state.reminders = state.reminders.filter(reminder => new Date(reminder.remindAt).getTime() > now);

      if (state.notices.length !== noticesBefore || state.reminders.length !== remindersBefore) {
        saveState();
      }
    }

    function deadlineInfo(deadline) {
      const days = daysUntil(deadline);

      if (days < 0) {
        return { label: `Overdue by ${Math.abs(days)} day(s)`, className: "badge-red" };
      }

      if (days === 0) {
        return { label: "Due today", className: "badge-red" };
      }

      if (days <= 3) {
        return { label: `${days} day(s) left`, className: "badge-yellow" };
      }

      return { label: `${days} day(s) left`, className: "badge-green" };
    }

    function daysUntil(dateString) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const target = parseLocalDate(dateString);
      target.setHours(0, 0, 0, 0);

      return Math.round((target - today) / DAY);
    }

    function parseLocalDate(dateString) {
      if (!dateString) return new Date();
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function completedMs(project) {
      if (project.completedAt) return Number(project.completedAt);
      if (project.deliveredAt) return parseLocalDate(project.deliveredAt).getTime();
      return Date.now();
    }

    function priorityRank(value) {
      if (value === "High") return 1;
      if (value === "Medium") return 2;
      return 3;
    }

    function formatDate(dateString) {
      if (!dateString) return "—";
      return parseLocalDate(dateString).toLocaleDateString("en-US", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function formatDateTime(value) {
      const date = typeof value === "number" ? new Date(value) : new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("en-US", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function timeLeft(ms) {
      if (ms <= 0) return "now";
      const minutes = Math.ceil(ms / (60 * 1000));
      const days = Math.floor(minutes / (60 * 24));
      const hours = Math.floor((minutes - days * 24 * 60) / 60);
      const remainingMinutes = minutes % 60;

      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${remainingMinutes}m`;
      return `${remainingMinutes}m`;
    }

    function localDateKey(date = new Date()) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function localMonthKey(date = new Date()) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    }

    function dateKeyFromParts(year, month, day) {
      return `${year}-${pad(month)}-${pad(day)}`;
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function valueOf(id) {
      return document.getElementById(id)?.value.trim() || "";
    }

    function uid() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    let toastTimer = null;
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    }
  </script>
</body>
</html>
